name: CI - Sistema Multiagente Reclutamiento

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Pruebas unitarias (sin LLM, deterministas)
        run: pytest tests/ -v --cov=shared --cov=agents --cov-report=term-missing

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --exclude checkpoints.sqlite

  eval-golden-set:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Evaluación LangSmith sobre golden set
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGSMITH_PROJECT: "reclutamiento-ci"
        run: python -m eval.langsmith_eval
        # Regla de promoción (documento §5.3.3): este job es informativo en CI;
        # el gate real de "no desplegar si baja del baseline" se aplica en el
        # paso de revisión del experimento en LangSmith antes de merge a main.
